<!DOCTYPE html>
<html>
<head>
    <title>BLE Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="">
    <style>
       body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .section {
            margin: 0 auto 5px auto;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            max-width: 500px;
            text-align: center;
        }
        .title-section {
            margin: 0 auto 10px auto;
            padding: 5px;
            border: 2px solid #ccc;
            border-radius: 8px;
            max-width: 400px;
            text-align: center;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        .d-pad {
            display: grid;
            grid-template-columns: 50px 50px 50px; /* 3 columns */
            grid-template-rows: 50px 50px 50px;    /* 3 rows */
            gap: 5px;
            margin-bottom: 15px;
            justify-content: center;
        }

        /* Assign specific buttons to grid coordinates (row / column) */
        #forward { grid-area: 1 / 2; } /* Top middle */
        #left    { grid-area: 2 / 1; } /* Middle left */
        #back    { grid-area: 3 / 2; } /* Bottom middle */
        #right   { grid-area: 2 / 3; } /* Middle right */

        /* Make D-pad buttons square */
        .d-pad button {
            padding: 0;
            width: 100%;
            height: 100%;
            font-size: 20px;
        }
        .slidecontainer {
            width: 100%;
            margin-top: 10px;
        }
        .slider {
            width: 100%; /* Forces the input track to span the entire width of the container */
        }
    </style>
</head>
<body>
    <div class="title-section"><h1>Shroomba Controller</h1></div>

  <div class="section">
    <h2>Connection Controls</h2>
    <div class="button-group">
        <button id="connectBleButton">Connect</button>
        <button id="disconnectBleButton">Disconnect</button>
    </div>
    <p>BLE state: <strong><span id="bleState" style="color:#d13a30;">Disconnected</span></strong></p>
  </div>
  <div class="section">
      <h2>Brush Control</h2>
      <div class="button-group">
          <button id="brushOnButton">ON</button>
          <button id="brushOffButton">OFF</button>
      </div>
      <div class="slidecontainer">
        <p>Brush Speed:</p>
        <input type="range" min="1" max="100" value="50" class="slider" id="brushSpeed">
      </div>
  </div>

  <div class="section">
      <h2>Movement Control</h2>
      <div class="d-pad">
          <button id="forward">↑</button>
          <button id="left">←</button>
          <button id="right">→</button>
          <button id="back">↓</button>
      </div>
      
      <div class="slidecontainer">
        <p>Movement Speed:</p>
        <input type="range" min="1" max="100" value="50" class="slider" id="moveSpeed">
      </div>
  </div>
</body>
<script>
    // --- DOM Elements ---
    const connectButton = document.getElementById('connectBleButton');
    const disconnectButton = document.getElementById('disconnectBleButton');
    const bleStateContainer = document.getElementById('bleState');

    // Brush Controls
    const brushOnButton = document.getElementById('brushOnButton');
    const brushOffButton = document.getElementById('brushOffButton');
    const brushSpeedSlider = document.getElementById('brushSpeed');

    // Movement Controls
    const btnForward = document.getElementById('forward');
    const btnBack = document.getElementById('back');
    const btnLeft = document.getElementById('left');
    const btnRight = document.getElementById('right');
    const moveSpeedSlider = document.getElementById('moveSpeed');

    // --- BLE Device Specs ---
    var deviceName = 'Shroomba';
    var bleService = '19b10000-e8f2-537e-4f6c-d104768a1214';
    // We will use ONE single characteristic for all controls
    var controlCharacteristicUUID = '19b10002-e8f2-537e-4f6c-d104768a1214'; 

    var bleServer;
    var bleServiceFound;

    // --- Global Control State ---
    // This holds the current "snapshot" of all inputs
    let controlState = {
        brushState: 0,   // 0: OFF, 1: ON
        brushSpeed: 50,  // 1 - 100
        moveDir: 0,      // 0: Stop, 1: Fwd, 2: Rev, 3: Left, 4: Right
        moveSpeed: 50    // 1 - 100
    };

    // --- Connection Setup ---
    connectButton.addEventListener('click', () => {
        if (isWebBluetoothEnabled()) connectToDevice();
    });
    disconnectButton.addEventListener('click', disconnectDevice);

    function isWebBluetoothEnabled() {
        if (!navigator.bluetooth) {
            bleStateContainer.innerHTML = "Web Bluetooth API is not available!";
            return false;
        }
        return true;
    }

    function connectToDevice() {
        console.log('Initializing Bluetooth...');
        navigator.bluetooth.requestDevice({
            filters: [{name: deviceName}],
            optionalServices: [bleService]
        })
        .then(device => {
            bleStateContainer.innerHTML = 'Connected to ' + device.name;
            bleStateContainer.style.color = "#24af37";
            device.addEventListener('gattservicedisconnected', onDisconnected);
            return device.gatt.connect();
        })
        .then(gattServer => {
            bleServer = gattServer;
            return bleServer.getPrimaryService(bleService);
        })
        .then(service => {
            bleServiceFound = service;
            console.log("Service discovered. Ready to send commands.");
            // Sync the ESP32 with the default slider positions immediately upon connection
            sendControlState(); 
        })
        .catch(error => {
            console.log('Connection Error: ', error);
        });
    }

    function onDisconnected() {
        bleStateContainer.innerHTML = "Disconnected";
        bleStateContainer.style.color = "#d13a30";
    }

    function disconnectDevice() {
        if (bleServer && bleServer.connected) {
            bleServer.disconnect();
        }
    }

    // --- Unified Send Function ---
    function sendControlState() {
        if (!bleServer || !bleServer.connected || !bleServiceFound) return;

        // Pack the state into a 4-byte array
        const data = new Uint8Array([
            controlState.brushState,
            controlState.brushSpeed,
            controlState.moveDir,
            controlState.moveSpeed
        ]);

        bleServiceFound.getCharacteristic(controlCharacteristicUUID)
        .then(characteristic => {
            return characteristic.writeValue(data);
        })
        .then(() => {
            console.log("Sent state: ", controlState);
        })
        .catch(error => {
            console.error("Error writing characteristic: ", error);
        });
    }

    // --- Event Listeners: Brush ---
    brushOnButton.addEventListener('click', () => {
        controlState.brushState = 1;
        sendControlState();
    });

    brushOffButton.addEventListener('click', () => {
        controlState.brushState = 0;
        sendControlState();
    });

    brushSpeedSlider.addEventListener('input', (event) => {
        controlState.brushSpeed = parseInt(event.target.value);
        sendControlState();
    });

    // --- Event Listeners: Movement Speed ---
    moveSpeedSlider.addEventListener('input', (event) => {
        controlState.moveSpeed = parseInt(event.target.value);
        sendControlState();
    });

    // --- Event Listeners: D-Pad ---
    // Helper function to handle momentary direction presses
    function setDirection(dirCode) {
        if (controlState.moveDir !== dirCode) {
            controlState.moveDir = dirCode;
            sendControlState();
        }
    }

    // Mouse/Touch Down -> Start Moving
    btnForward.addEventListener('mousedown', () => setDirection(1));
    btnBack.addEventListener('mousedown', () => setDirection(2));
    btnLeft.addEventListener('mousedown', () => setDirection(3));
    btnRight.addEventListener('mousedown', () => setDirection(4));

    btnForward.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(1); });
    btnBack.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(2); });
    btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(3); });
    btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); setDirection(4); });

    // Mouse/Touch Up -> Stop Moving
    const stopMoving = () => setDirection(0);
    const dPadButtons = [btnForward, btnBack, btnLeft, btnRight];

    dPadButtons.forEach(btn => {
        btn.addEventListener('mouseup', stopMoving);
        btn.addEventListener('mouseleave', stopMoving);
        btn.addEventListener('touchend', stopMoving);
    });

    // --- Keyboard Control ---
    document.addEventListener('keydown', (event) => {
        if (event.repeat) return; // Ignore holding down

        const key = event.key.toLowerCase();
        
        if (key === 'o') { brushOnButton.click(); }
        else if (key === 'p') { brushOffButton.click(); }
        
        // WASD or Arrow keys for driving
        if (key === 'w' || key === 'arrowup') { setDirection(1); }
        else if (key === 's' || key === 'arrowdown') { setDirection(2); }
        else if (key === 'a' || key === 'arrowleft') { setDirection(3); }
        else if (key === 'd' || key === 'arrowright') { setDirection(4); }
    });

    document.addEventListener('keyup', (event) => {
        const key = event.key.toLowerCase();
        // Stop moving when movement keys are released
        if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
            stopMoving();
        }
    });
</script>

</html>
